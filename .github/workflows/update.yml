name: Update Cotton Drought Dashboard

on:
  schedule:
    - cron: "0 14 * * 2"
  workflow_dispatch:
  push:
    paths:
      - "data/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for rebase operations

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure docs folder exists
        run: |
          mkdir -p docs
          touch docs/.nojekyll

      - name: Run analysis — generate docs/index.html
        run: python process_data.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/.nojekyll
          
          # Only commit if there are changes
          git diff --cached --quiet && exit 0 || \
            git commit -m "chore: regenerate dashboard [$(date -u +%Y-%m-%d)]"
          
          # FIX: Pull remote changes before pushing
          git pull --rebase origin main
          
          # Now push safely
          git push origin main
