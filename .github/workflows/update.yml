name: Update Cotton Drought Dashboard

on:
  schedule:
    - cron: "0 14 * * 2"
  workflow_dispatch:
  push:
    paths:
      - "data/**"
      - "process_data.py"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify data files exist
        run: |
          echo "Checking data files..."
          ls -la data/
          if [ ! -f "data/drought_US.csv" ]; then
            echo "ERROR: drought_US.csv not found!"
            exit 1
          fi
          if [ ! -f "data/drought_texas.csv" ]; then
            echo "ERROR: drought_texas.csv not found!"
            exit 1
          fi
          if [ ! -f "data/cotton_texas.csv" ]; then
            echo "ERROR: cotton_texas.csv not found!"
            exit 1
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure docs folder exists
        run: |
          mkdir -p docs
          touch docs/.nojekyll

      - name: Run analysis — generate docs/index.html
        run: |
          python process_data.py
          echo "Checking generated file..."
          ls -la docs/

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/.nojekyll
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: regenerate dashboard [$(date -u +%Y-%m-%d)]"
          
          # FIX: Use merge instead of rebase, prefer our changes on conflict
          git fetch origin main
          git merge origin/main --strategy-option=ours || true
          
          # If merge failed, force our version
          git checkout --ours docs/index.html || true
          git add docs/index.html || true
          git commit -m "resolve: merge conflict keep regenerated dashboard" || true
          
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
