name: Update Cotton Drought Dashboard

on:
  schedule:
    - cron: "0 14 * * 2"
  workflow_dispatch:
  push:
    paths:
      - "data/**"
      - "process_data.py"

permissions:
  contents: write
  pages: write      # Add this for GitHub Pages
  id-token: write   # Add this for GitHub Pages

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify data files exist
        run: |
          echo "Checking data files..."
          ls -la data/
          if [ ! -f "data/drought_US.csv" ]; then
            echo "ERROR: drought_US.csv not found!"
            exit 1
          fi
          if [ ! -f "data/drought_texas.csv" ]; then
            echo "ERROR: drought_texas.csv not found!"
            exit 1
          fi
          if [ ! -f "data/cotton_texas.csv" ]; then
            echo "ERROR: cotton_texas.csv not found!"
            exit 1
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure docs folder exists
        run: |
          mkdir -p docs
          touch docs/.nojekyll

      - name: Run analysis — generate docs/index.html
        run: |
          python process_data.py
          echo "Checking generated file..."
          ls -la docs/

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/.nojekyll
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "chore: regenerate dashboard [$(date -u +%Y-%m-%d)]"
          git pull --rebase origin main
          git push origin main
